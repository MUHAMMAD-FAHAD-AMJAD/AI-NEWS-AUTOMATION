name: WhatsApp Session Health Check

# ─── Triggers ────────────────────────────────────────────────────────────────
# Weekly on Monday 9AM UTC — keeps the WhatsApp session warm.
# Baileys sessions expire if unused for extended periods (typically 14+ days).
# This check connects, verifies the session is alive, logs result, and exits.
# It does NOT post anything to the channel.
on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 9AM UTC — once per week
  workflow_dispatch:        # Manual trigger for testing

# ─── Concurrency ─────────────────────────────────────────────────────────────
concurrency:
  group: health-check
  cancel-in-progress: false

# ─── Job ─────────────────────────────────────────────────────────────────────
jobs:
  health-check:
    name: WhatsApp Session Health Check
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:

      # ── Step 1: Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 2

      # ── Step 2: Setup Node.js 20 ──────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        timeout-minutes: 3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: baileys-sender/package-lock.json

      # ── Step 3: Install Node.js dependencies ──────────────────────────────
      - name: Install Node.js dependencies
        working-directory: baileys-sender
        timeout-minutes: 3
        run: npm ci

      # ── Step 4: Setup Python 3.11 ─────────────────────────────────────────
      # Needed to run the Supabase error_log insert via Python helper
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        timeout-minutes: 3
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 5: Install Python dependencies ───────────────────────────────
      - name: Install Python dependencies
        timeout-minutes: 3
        run: pip install -r requirements.txt

      # ── Step 6: Run health check ───────────────────────────────────────────
      # Runs health-check.js which:
      #   1. Loads Baileys session from Supabase
      #   2. Attempts connection (30s timeout)
      #   3. Logs result to Supabase error_log table
      #   4. Exits 0 on success, 1 on failure
      # Does NOT post any message to the WhatsApp channel.
      - name: Run WhatsApp Session Health Check
        id: health_check
        working-directory: baileys-sender
        timeout-minutes: 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WHATSAPP_CHANNEL_JID: ${{ secrets.WHATSAPP_CHANNEL_JID }}
          HEALTH_CHECK_MODE: 'true'
        run: node health-check.js

      # ── Step 7: Log result to Supabase (always runs) ──────────────────────
      # Even if health check fails, we log the result so we can track
      # session health over time in the Supabase dashboard.
      - name: Log health check result to Supabase
        if: always()
        timeout-minutes: 2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HEALTH_STATUS: ${{ steps.health_check.outcome }}
        run: |
          python - <<'EOF'
          import os
          from supabase import create_client
          from datetime import datetime, timezone

          url = os.environ.get("SUPABASE_URL", "")
          key = os.environ.get("SUPABASE_KEY", "")
          status = os.environ.get("HEALTH_STATUS", "unknown")

          if not url or not key:
              print("[HEALTH] Supabase credentials not available — skipping log")
              exit(0)

          try:
              sb = create_client(url, key)
              sb.table("error_log").insert({
                  "component": "health_check",
                  "provider": "whatsapp_session",
                  "error_type": "SESSION_OK" if status == "success" else "SESSION_FAILED",
                  "error_message": f"Weekly health check: {status}",
                  "run_id": "health-check-" + datetime.now(tz=timezone.utc).strftime("%Y%m%d")
              }).execute()
              print(f"[HEALTH] Logged status '{status}' to Supabase error_log")
          except Exception as e:
              print(f"[HEALTH] Could not log to Supabase: {type(e).__name__}: {e}")
          EOF
