name: WhatsApp Session Health Check

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 9AM UTC — once per week
  workflow_dispatch:

concurrency:
  group: health-check
  cancel-in-progress: false

jobs:
  health-check:
    name: WhatsApp Session Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24 runtime now

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        timeout-minutes: 2

      - name: Setup Node.js 20
        uses: actions/setup-node@v4.1.0
        timeout-minutes: 3
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        working-directory: baileys-sender
        timeout-minutes: 3
        run: npm ci

      - name: Setup Python 3.11
        uses: actions/setup-python@v5.3.0
        timeout-minutes: 3
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        timeout-minutes: 3
        run: pip install -r requirements.txt

      - name: Run WhatsApp Session Health Check
        id: health_check
        working-directory: baileys-sender
        timeout-minutes: 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WHATSAPP_CHANNEL_JID: ${{ secrets.WHATSAPP_CHANNEL_JID }}
          HEALTH_CHECK_MODE: 'true'
        run: node health-check.js

      - name: Log health check result to Supabase
        if: always()
        timeout-minutes: 2
        env:
          PYTHONPATH: ${{ github.workspace }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HEALTH_STATUS: ${{ steps.health_check.outcome }}
        run: |
          python - <<'EOF'
          import os
          from supabase import create_client
          from datetime import datetime, timezone

          url = os.environ.get("SUPABASE_URL", "")
          key = os.environ.get("SUPABASE_KEY", "")
          status = os.environ.get("HEALTH_STATUS", "unknown")

          if not url or not key:
              print("[HEALTH] Supabase credentials not available -- skipping log")
              exit(0)

          try:
              sb = create_client(url, key)
              sb.table("error_log").insert({
                  "component": "health_check",
                  "provider": "whatsapp_session",
                  "error_type": "SESSION_OK" if status == "success" else "SESSION_FAILED",
                  "error_message": f"Weekly health check: {status}",
                  "run_id": "health-check-" + datetime.now(tz=timezone.utc).strftime("%Y%m%d")
              }).execute()
              print(f"[HEALTH] Logged status '{status}' to Supabase error_log")
          except Exception as e:
              print(f"[HEALTH] Could not log to Supabase: {type(e).__name__}: {e}")
          EOF
