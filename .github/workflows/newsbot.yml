name: AI News Bot

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 * * * *'   # Every hour — 720 min/month (free tier safe)
  workflow_dispatch:        # Manual trigger: Actions → AI News Bot → Run workflow

# ─── Concurrency ─────────────────────────────────────────────────────────────
concurrency:
  group: newsbot-pipeline
  cancel-in-progress: false

# ─── Job ─────────────────────────────────────────────────────────────────────
jobs:
  run-newsbot:
    name: Run AI News Pipeline
    runs-on: ubuntu-latest
    # NOTE: 'environment: production' removed — repository secrets do not
    # require environment scoping and the protection rules were blocking injection
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24 runtime now

    steps:

      # ── Step 1: Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        timeout-minutes: 2

      # ── Step 2: Setup Python 3.11 ─────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5.3.0
        timeout-minutes: 3
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3: Install Python dependencies ───────────────────────────────
      - name: Install Python dependencies
        timeout-minutes: 5
        run: pip install -r requirements.txt

      # ── Step 4: Run Python Orchestrator ───────────────────────────────────
      - name: Run Python Orchestrator
        id: orchestrator
        timeout-minutes: 10
        env:
          PYTHONPATH: ${{ github.workspace }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WHATSAPP_CHANNEL_JID: ${{ secrets.WHATSAPP_CHANNEL_JID }}
          PAYLOAD_PATH: /tmp/article_payload.json
        run: python orchestrator/main.py

      # ── Step 5: Setup Node.js 22 (only if article ready AND baileys-sender exists) ──
      - name: Setup Node.js 22
        if: steps.orchestrator.outputs.has_article == 'true' && hashFiles('baileys-sender/package.json') != ''
        uses: actions/setup-node@v4.1.0
        timeout-minutes: 3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: baileys-sender/package-lock.json

      # ── Step 6: Install Node.js dependencies ──────────────────────────────
      - name: Install Node.js dependencies
        if: steps.orchestrator.outputs.has_article == 'true' && hashFiles('baileys-sender/package.json') != ''
        working-directory: baileys-sender
        timeout-minutes: 3
        run: npm ci --prefer-offline

      # ── Step 7: Run Baileys Sender ────────────────────────────────────────
      - name: Run Baileys WhatsApp Sender
        if: steps.orchestrator.outputs.has_article == 'true' && hashFiles('baileys-sender/package.json') != ''
        working-directory: baileys-sender
        timeout-minutes: 4
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WHATSAPP_CHANNEL_JID: ${{ secrets.WHATSAPP_CHANNEL_JID }}
          ARTICLE_PAYLOAD_PATH: ${{ steps.orchestrator.outputs.payload_path }}
        run: node sender.js
