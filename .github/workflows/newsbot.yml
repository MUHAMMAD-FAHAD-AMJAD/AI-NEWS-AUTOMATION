name: AI News Bot

# ─── Triggers ────────────────────────────────────────────────────────────────
# Cron: hourly (0 * * * *) = 24 runs/day × ~2 min = ~720 min/month
# ✅ Well within GitHub Actions free tier (2,000 min/month)
# ⚠️  Original spec had */30 (every 30 min) = 2,880 min/month — EXCEEDS limit
# workflow_dispatch: allows manual run from Actions tab for testing
on:
  schedule:
    - cron: '0 * * * *'   # Every hour — 720 min/month (free tier safe)
  workflow_dispatch:        # Manual trigger: Actions → AI News Bot → Run workflow

# ─── Concurrency ─────────────────────────────────────────────────────────────
# Prevent overlapping runs if a run takes longer than 1 hour (edge case)
concurrency:
  group: newsbot-pipeline
  cancel-in-progress: false  # Never cancel a running post — let it finish

# ─── Job ─────────────────────────────────────────────────────────────────────
jobs:
  run-newsbot:
    name: Run AI News Pipeline
    runs-on: ubuntu-latest
    environment: production    # Scopes secrets to production environment
    timeout-minutes: 15        # Hard ceiling for the entire job

    steps:

      # ── Step 1: Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 2

      # ── Step 2: Setup Python 3.11 ─────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        timeout-minutes: 3
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3: Install Python dependencies ───────────────────────────────
      - name: Install Python dependencies
        timeout-minutes: 5
        run: pip install -r requirements.txt

      # ── Step 4: Run Python Orchestrator ───────────────────────────────────
      # Sets has_article and payload_path outputs via $GITHUB_OUTPUT
      # All 7 secrets injected as environment variables
      - name: Run Python Orchestrator
        id: orchestrator
        timeout-minutes: 10
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WHATSAPP_CHANNEL_JID: ${{ secrets.WHATSAPP_CHANNEL_JID }}
          PAYLOAD_PATH: /tmp/article_payload.json
        run: python orchestrator/main.py

      # ── Step 5: Setup Node.js 20 (conditional — only if article ready) ────
      # Runs regardless of has_article — needed for the next step condition
      # but npm install is skipped if no article (saves ~30s)
      - name: Setup Node.js 20
        if: steps.orchestrator.outputs.has_article == 'true'
        uses: actions/setup-node@v4
        timeout-minutes: 3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: baileys-sender/package-lock.json

      # ── Step 6: Install Node.js dependencies ──────────────────────────────
      - name: Install Node.js dependencies
        if: steps.orchestrator.outputs.has_article == 'true'
        working-directory: baileys-sender
        timeout-minutes: 3
        run: npm ci

      # ── Step 7: Run Baileys Sender ────────────────────────────────────────
      # Only runs when Python orchestrator found a new article to post.
      # This is the primary anti-ban mechanism: Baileys connects to WhatsApp
      # at most 5 times per day (daily post cap), never 24.
      - name: Run Baileys WhatsApp Sender
        if: steps.orchestrator.outputs.has_article == 'true'
        working-directory: baileys-sender
        timeout-minutes: 3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WHATSAPP_CHANNEL_JID: ${{ secrets.WHATSAPP_CHANNEL_JID }}
          ARTICLE_PAYLOAD_PATH: ${{ steps.orchestrator.outputs.payload_path }}
        run: node sender.js
